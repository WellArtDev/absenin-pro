name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend → api.absenin.com
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /api.absenin.com/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .env
            .env.example
            README.md

  deploy-frontend:
    name: Deploy Frontend → hub.absenin.com
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/
          server-dir: /hub.absenin.com/
          exclude: |
            **/.git*
            **/.git*/**
            node_modules/**
            .next/**
            .gitignore
            .env.local
            .env.local.example
            DEPLOY_CPANEL.md
            README.md
